description: >-
  Brinker International is a leading casual dining restaurant company that owns,
  operates, and franchises Chili's Grill & Bar and Maggiano's Little Italy.
  Headquartered in Dallas, Texas, Brinker operates over 1,600 Chili's locations
  across 29 countries and over 50 Maggiano's locations in the United States.
  The company leverages digital ordering platforms, loyalty programs, mobile
  apps, in-restaurant kiosks, and point-of-sale integrations for restaurant
  operations, running a unified open-source e-commerce environment built on
  Red Hat (RHEL, Satellite, Lightspeed) and using Prismic CMS for digital
  content management. Brinker operates an SSO-gated partner/franchise API
  developer portal at developer.brinker.com for onboarding partners; there is
  no public, self-service developer API, OpenAPI specification, SDK, or open
  GitHub organization. Consumer-facing surfaces are the Chili's and Maggiano's
  mobile apps and websites and their loyalty programs.
